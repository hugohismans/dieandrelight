<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ElecGame — Editor</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #08080f;
  font-family: 'Courier New', monospace;
  color: #00ffcc;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
#toolbar {
  display: flex;
  gap: 6px;
  padding: 8px 12px;
  background: #060610;
  border-bottom: 1px solid #1a5a3a;
  flex-wrap: wrap;
  align-items: center;
  flex-shrink: 0;
  z-index: 10;
}
.tool-btn {
  background: #0a1a14;
  border: 1px solid #1a5a3a;
  color: #446655;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  padding: 4px 11px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: all 0.15s;
  white-space: nowrap;
}
.tool-btn:hover { border-color: #336655; color: #00bb99; }
.tool-btn.active {
  border-color: #00ffcc;
  color: #00ffcc;
  background: #0d2a1e;
  box-shadow: 0 0 8px #00ffcc44;
}
.sep { width: 1px; height: 26px; background: #1a5a3a; flex-shrink: 0; }
#node-type-row {
  display: flex; gap: 4px; align-items: center;
}
.ntype-btn {
  background: #0a1a14;
  border: 1px solid #1a5a3a;
  color: #446655;
  font-family: 'Courier New', monospace;
  font-size: 15px;
  width: 34px; height: 28px;
  cursor: pointer;
  border-radius: 3px;
  transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.ntype-btn:hover { border-color: #336655; color: #00bb99; background: #0d2218; }
.ntype-btn.active { border-color: #00ffcc; background: #0d2a1e; box-shadow: 0 0 8px #00ffcc44; color: #00ffcc; }
#level-name {
  background: #0a1a14;
  border: 1px solid #1a5a3a;
  color: #00ffcc;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  padding: 3px 8px;
  width: 160px;
}
#validator {
  font-size: 11px;
  padding: 3px 10px;
  border: 1px solid #1a5a3a;
  letter-spacing: 1px;
  white-space: nowrap;
}
#canvas-wrap {
  position: relative;
  flex: 1;
  overflow: hidden;
}
#c {
  display: block;
  position: absolute;
  top: 0; left: 0;
}
#props-panel {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: #060610ee;
  border-top: 1px solid #1a5a3a;
  padding: 8px 14px;
  font-size: 12px;
  min-height: 44px;
  display: flex;
  gap: 18px;
  align-items: center;
  flex-wrap: wrap;
  z-index: 5;
}
#props-panel label { color: #446655; margin-right: 3px; }
#props-panel input, #props-panel select {
  background: #0a1a14;
  border: 1px solid #1a5a3a;
  color: #00ffcc;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  padding: 2px 7px;
  width: 90px;
}
#props-panel input[type=checkbox] { width: auto; accent-color: #00ffcc; cursor: pointer; }
#props-title { color: #00ffcc; font-weight: bold; white-space: nowrap; }

/* Edge props visual buttons */
.prop-group { display: flex; flex-direction: column; gap: 4px; }
.prop-group-label { font-size: 10px; color: #2a5a40; letter-spacing: 2px; text-transform: uppercase; }
.prop-btns { display: flex; gap: 5px; }
.prop-btn {
  font-family: 'Courier New', monospace;
  font-size: 12px;
  padding: 5px 12px;
  border: 1px solid #1a5a3a;
  background: #0a1a14;
  color: #446655;
  cursor: pointer;
  letter-spacing: 1px;
  border-radius: 3px;
  transition: all 0.12s;
  white-space: nowrap;
}
.prop-btn:hover { border-color: #336655; color: #00bb99; }
.prop-btn.active-none  { border-color: #446655; color: #aaaaaa; background: #1a1a2a; }
.prop-btn.active-q     { border-color: #ffaa00; color: #ffaa00; background: #2a1a00; box-shadow: 0 0 8px #ffaa0044; }
.prop-btn.active-p     { border-color: #cc44ff; color: #cc44ff; background: #1a0030; box-shadow: 0 0 8px #cc44ff44; }
.prop-btn.active-open  { border-color: #00cc88; color: #00cc88; background: #001a12; }
.prop-btn.active-closed{ border-color: #ff5544; color: #ff5544; background: #2a0800; }
.prop-btn.active-res   { border-color: #ff8800; color: #ff8800; background: #2a1400; box-shadow: 0 0 8px #ff880044; }
.prop-btn.active-ind   { border-color: #aa44ff; color: #cc66ff; background: #1a0a2a; box-shadow: 0 0 8px #aa44ff44; }
.prop-sep-v { width: 1px; background: #1a5a3a; align-self: stretch; margin: 0 6px; }
/* Node type + teleporter group buttons in props panel */
.pnt-btn { font-size: 15px; padding: 4px 10px; min-width: 38px; }
.ptg-btn { min-width: 32px; font-weight: bold; }
#status-bar {
  position: absolute;
  top: 8px; left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: #446655;
  letter-spacing: 1px;
  background: #060610cc;
  padding: 3px 12px;
  pointer-events: none;
  z-index: 6;
  border: 1px solid #1a5a3a;
  opacity: 0;
  transition: opacity 0.3s;
}
#zoom-label {
  position: absolute;
  bottom: 52px; right: 180px;
  font-size: 10px;
  color: #2a5a45;
  pointer-events: none;
  z-index: 6;
}
/* Minimap */
#minimap {
  position: absolute;
  bottom: 52px; right: 8px;
  width: 160px;
  height: 100px;
  background: #060610cc;
  border: 1px solid #1a5a3a;
  z-index: 6;
  overflow: hidden;
}
#minimap canvas { display: block; }

/* Lang toggle */
#lang-toggle {
  background: #0a1a14;
  border: 1px solid #1a5a3a;
  color: #336655;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 3px 8px;
  cursor: pointer;
  transition: all 0.15s;
  margin-left: auto;
}
#lang-toggle:hover { border-color: #00ffcc; color: #00ffcc; }

/* ── DOC MODAL ──────────────────────────────────────────── */
#doc-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
#doc-overlay.visible { display: flex; }
#doc-box {
  background: #060c0a;
  border: 1px solid #1a5a3a;
  width: min(820px, 95vw);
  max-height: 88vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 40px #00ffcc18;
}
#doc-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  border-bottom: 1px solid #1a5a3a;
  flex-shrink: 0;
}
#doc-header h2 {
  font-size: 13px;
  letter-spacing: 4px;
  color: #00ffcc;
  text-transform: uppercase;
  font-weight: normal;
}
#doc-close {
  background: none;
  border: none;
  color: #446655;
  font-size: 18px;
  cursor: pointer;
  line-height: 1;
  padding: 0 4px;
  font-family: 'Courier New', monospace;
}
#doc-close:hover { color: #ff4444; }
#doc-body {
  overflow-y: auto;
  padding: 18px 24px 24px;
  display: flex;
  flex-direction: column;
  gap: 22px;
}
#doc-body::-webkit-scrollbar { width: 4px; }
#doc-body::-webkit-scrollbar-thumb { background: #1a5a3a; border-radius: 2px; }
.doc-section h3 {
  font-size: 10px;
  letter-spacing: 3px;
  color: #00cc99;
  text-transform: uppercase;
  border-bottom: 1px solid #0d2a1a;
  padding-bottom: 6px;
  margin-bottom: 10px;
  font-weight: normal;
}
.doc-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 6px 18px;
  align-items: start;
}
.doc-key {
  display: inline-flex;
  gap: 4px;
  flex-wrap: nowrap;
  align-items: center;
  white-space: nowrap;
}
.kbd {
  background: #0a1a14;
  border: 1px solid #2a6a4a;
  border-bottom: 2px solid #1a4a2a;
  color: #00ffcc;
  font-family: 'Courier New', monospace;
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 3px;
  white-space: nowrap;
}
.doc-desc {
  color: #557766;
  font-size: 12px;
  line-height: 1.5;
  padding-top: 1px;
}
.doc-desc strong { color: #00cc99; font-weight: normal; }
.doc-note {
  font-size: 11px;
  color: #2a5a3a;
  border-left: 2px solid #1a4a2a;
  padding-left: 10px;
  line-height: 1.6;
}
.doc-elem-grid {
  display: grid;
  grid-template-columns: 28px 1fr;
  gap: 8px 14px;
  align-items: start;
}
.doc-icon {
  font-size: 16px;
  text-align: center;
  padding-top: 2px;
}
.doc-elem-desc { color: #557766; font-size: 12px; line-height: 1.5; }
.doc-elem-desc strong { color: #00cc99; font-weight: normal; }

/* Test overlay */
#test-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: #06060eee;
  z-index: 100;
  flex-direction: column;
}
#test-overlay.visible { display: flex; }
#test-toolbar {
  display: flex;
  gap: 10px;
  padding: 8px 14px;
  background: #060610;
  border-bottom: 1px solid #00ffcc33;
  align-items: center;
}
#test-toolbar span { color: #446655; font-size: 12px; letter-spacing: 1px; }
#test-iframe {
  flex: 1;
  border: none;
  background: #08080f;
}
</style>
</head>
<body>

<div id="toolbar">
  <input id="level-name" type="text" value="Mon niveau" title="Nom du niveau" />
  <div class="sep"></div>
  <button class="tool-btn active" id="btn-select" onclick="setTool('select')" title="[S]">✦ Select</button>
  <button class="tool-btn" id="btn-node"   onclick="setTool('node')"   title="[N]">+ Node</button>
  <button class="tool-btn" id="btn-wire"   onclick="setTool('wire')"   title="[W]">⌇ Wire</button>
  <button class="tool-btn" id="btn-delete" onclick="setTool('delete')" title="[D]">✕ Delete</button>
  <div class="sep"></div>
  <div id="node-type-row">
    <button class="ntype-btn" id="nt-source"     onclick="setNType('source')"     title="Source — point de départ [⚡]">⚡</button>
    <button class="ntype-btn active" id="nt-node" onclick="setNType('node')"      title="Junction — nœud de connexion [●]">●</button>
    <button class="ntype-btn" id="nt-bulb"       onclick="setNType('bulb')"       title="Ampoule — objectif [💡]">💡</button>
    <button class="ntype-btn" id="nt-teleporter" onclick="setNType('teleporter')" title="Téléporteur quantique [🌀]">🌀</button>
  </div>
  <div class="sep"></div>
  <button class="tool-btn" onclick="clearLevel()" title="Effacer">⟳ Clear</button>
  <button class="tool-btn" onclick="loadFile()"   title="Charger JSON">📂 Load</button>
  <button class="tool-btn" onclick="saveFile()"   title="Sauvegarder JSON">💾 Save</button>
  <button class="tool-btn" onclick="openTest()" style="border-color:#00ffcc55;color:#00cc99" title="Tester">▶ Test</button>
  <button class="tool-btn" onclick="fitView()"  title="Recentrer [F]">⊡ Fit</button>
  <div class="sep"></div>
  <label style="display:flex;align-items:center;gap:6px;font-size:11px;color:#446655;white-space:nowrap">
    <span id="speed-label">⚡ Vitesse</span>
    <input type="range" id="ball-speed" min="0.25" max="4" step="0.25" value="1"
      style="width:80px;accent-color:#00ffcc;cursor:pointer"
      oninput="document.getElementById('ball-speed-val').textContent='×'+parseFloat(this.value).toFixed(2)">
    <span id="ball-speed-val" style="color:#00ffcc;min-width:36px">×1.00</span>
  </label>
  <div class="sep"></div>
  <div id="validator">…</div>
  <button id="lang-toggle">EN</button>
  <button class="tool-btn" id="doc-btn" onclick="openDoc()" title="Aide / Documentation" style="border-color:#00ffcc55;color:#00cc99">? Aide</button>
  <a href="index.html" class="tool-btn" style="text-decoration:none;padding:4px 11px" title="Retour à l'accueil">⌂</a>
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="props-panel">
    <span id="props-default-hint" style="color:#1a5a3a;font-size:11px"></span>
  </div>
  <div id="status-bar"></div>
  <div id="zoom-label">100%</div>
  <div id="minimap"><canvas id="minimap-c" width="160" height="100"></canvas></div>
</div>

<!-- Test overlay -->
<div id="test-overlay">
  <div id="test-toolbar">
    <button class="tool-btn" id="test-back-btn" onclick="closeTest()" style="border-color:#ff4444;color:#ff4444">✕ Retour à l'éditeur</button>
    <span id="test-note-span">TEST — Les modifications de l'éditeur ne s'appliquent pas en direct</span>
    <button class="tool-btn" id="test-reload-btn" onclick="reloadTest()">↺ Relancer</button>
  </div>
  <iframe id="test-iframe" src="about:blank"></iframe>
</div>

<input type="file" id="file-input" accept=".json" style="display:none">

<!-- Documentation modal -->
<div id="doc-overlay">
  <div id="doc-box">
    <div id="doc-header">
      <h2>📖 Aide — Éditeur de niveaux</h2>
      <button id="doc-close" onclick="closeDoc()">✕</button>
    </div>
    <div id="doc-body">

    </div>
  </div>
</div>

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const mmCanvas = document.getElementById('minimap-c');
const mmCtx    = mmCanvas.getContext('2d');

// ── VIEWPORT ───────────────────────────────────────────────
let VW, VH;
let viewX = 0, viewY = 0, viewScale = 1;

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  const panelH = document.getElementById('props-panel').offsetHeight;
  VW = wrap.clientWidth;
  VH = wrap.clientHeight - panelH;
  canvas.width  = VW;
  canvas.height = VH;
  canvas.style.width  = VW + 'px';
  canvas.style.height = VH + 'px';
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); });

const GRID   = 20;
const BEVEL  = 35;
const SW_GAP = 28;

function screenToWorld(sx, sy) {
  return { x: (sx - viewX) / viewScale, y: (sy - viewY) / viewScale };
}
function worldToScreen(wx, wy) {
  return { x: wx * viewScale + viewX, y: wy * viewScale + viewY };
}
function snap(v) { return Math.round(v / GRID) * GRID; }

let currentLang = localStorage.getItem('elecgame_lang') || 'fr';

function tr(key) {
  return (TRANSLATIONS[currentLang] || TRANSLATIONS.fr)[key] || TRANSLATIONS.fr[key] || key;
}

function applyLang() {
  document.documentElement.lang = currentLang;
  // Toolbar buttons

// ── DATA ───────────────────────────────────────────────────
let nodes = [
  { id: 0, type: 'source', x: 60,  y: 150 },
  { id: 1, type: 'bulb',   x: 740, y: 150 }
];
let edges = [];
let nextNodeId = 2;
let nextEdgeId = 0;

// ── UNDO / REDO ───────────────────────────────────────────
const undoStack = [];
const redoStack = [];
function saveState_() {
  return JSON.stringify({ nodes: nodes.map(n=>({...n})), edges: edges.map(e=>({...e})) });
}
function applyState_(json) {
  const s = JSON.parse(json);
  nodes = s.nodes; edges = s.edges;
  nextNodeId = nodes.reduce((m, n) => Math.max(m, n.id + 1), 0);
  nextEdgeId = edges.reduce((m, e) => Math.max(m, e.id + 1), 0);
  selectedNode = null; selectedEdge = null;
  buildProps();
}
function saveUndo() {
  undoStack.push(saveState_());
  if (undoStack.length > 60) undoStack.shift();
  redoStack.length = 0;
}
function undo() {
  if (!undoStack.length) { flash(tr('flash.undo.none')); return; }
  redoStack.push(saveState_());
  applyState_(undoStack.pop());
  flash(tr('flash.undo'));
}
function redo() {
  if (!redoStack.length) { flash(tr('flash.redo.none')); return; }
  undoStack.push(saveState_());
  applyState_(redoStack.pop());
  flash(tr('flash.redo'));
}

// ── COPY / PASTE ───────────────────────────────────────────
let clipboard = null; // { nodes: [...], edges: [...] }

function copySelection() {
  const src = selectedNodes.length > 0 ? selectedNodes : (selectedNode ? [selectedNode] : []);
  if (!src.length) return;
  const ids = new Set(src.map(n => n.id));
  clipboard = {
    nodes: src.map(n => ({ ...n })),
    edges: edges.filter(e => ids.has(e.from) && ids.has(e.to)).map(e => ({ ...e }))
  };
  flash(src.length + ' ' + tr('flash.copy'));
}

function pasteSelection() {
  if (!clipboard || !clipboard.nodes.length) return;
  saveUndo();
  const OFF = 40;
  const idMap = {};
  const newNodes = clipboard.nodes.map(n => {
    const newId = nextNodeId++;
    idMap[n.id] = newId;
    return { ...n, id: newId, x: n.x + OFF, y: n.y + OFF };
  });
  const newEdges = clipboard.edges.map(e => ({
    ...e, id: nextEdgeId++, from: idMap[e.from], to: idMap[e.to]
  }));
  nodes.push(...newNodes);
  edges.push(...newEdges);
  selectedNodes = newNodes; selectedNode = null; selectedEdge = null;
  buildProps(); validate();
  flash(newNodes.length + ' ' + tr('flash.paste'));
}

// ── TOOL STATE ─────────────────────────────────────────────
let tool = 'select';
let wireFrom = null;
let selectedNode = null;
let selectedEdge = null;
let selectedNodes = [];     // multi-select (array of node objects)
let selectionRect = null;   // { sx, sy, ex, ey } world coords while drag-selecting
let multiDragging = null;   // { startX, startY, origNodes, origEdgeWayY }
let dragging = null;
let hoveredNode = null;
let hoveredEdge = null;

// Pan state
let panning = false;

let panStart = null;

let _nodeType = 'node';

}
function getNodeMeta() {

  if (type === 'teleporter') meta.group = 'A'; // default group, user can change in props
  return meta;

// ── VALIDATION ─────────────────────────────────────────────
function validate() {
  const el = document.getElementById('validator');
  const sources = nodes.filter(n => n.type === 'source');
  const bulbs   = nodes.filter(n => n.type === 'bulb');
  const issues = [];
  if (sources.length === 0) issues.push(tr('validate.no_source'));
  if (bulbs.length === 0)   issues.push(tr('validate.no_bulb'));
  // Check every non-source node is reachable from a source
  const reachable = new Set(sources.map(n => n.id));
  let changed = true;
  while (changed) {
    changed = false;
    for (const e of edges) {
      if (reachable.has(e.from) && !reachable.has(e.to)) { reachable.add(e.to); changed = true; }
    }
    // Teleporter pairs: if one portal is reachable, the other becomes reachable too
    const tpByGroup = {};
    for (const n of nodes.filter(n => n.type === 'teleporter')) {
      const g = n.group || '?';
      (tpByGroup[g] = tpByGroup[g] || []).push(n.id);
    }
    for (const ids of Object.values(tpByGroup)) {
      const anyReachable = ids.some(id => reachable.has(id));
      if (anyReachable) {
        for (const id of ids) {
          if (!reachable.has(id)) { reachable.add(id); changed = true; }
        }
      }
    }
  }
  const unreachable = nodes.filter(n => n.type !== 'source' && !reachable.has(n.id));
  if (unreachable.length) issues.push(unreachable.length + tr('validate.unreachable'));
  // Isolated nodes (no edges)
  const connected = new Set(edges.flatMap(e => [e.from, e.to]));
  const isolated = nodes.filter(n => !connected.has(n.id) && nodes.length > 1);
  if (isolated.length) issues.push(isolated.length + tr('validate.isolated'));
  // Check teleporter pairs
  const tpGroups = {};
  for (const n of nodes.filter(n => n.type === 'teleporter')) {
    const g = n.group || '?';
    tpGroups[g] = (tpGroups[g] || 0) + 1;
  }
  for (const [g, count] of Object.entries(tpGroups)) {
    if (count !== 2) issues.push(`Téléporteur groupe ${g} : ${count} nœud(s) (doit être exactement 2)`);
  }

  if (issues.length === 0) {
    el.textContent = tr('validate.ok');
    el.style.color = '#00ffcc'; el.style.borderColor = '#00ffcc44';
  } else {
    el.textContent = '⚠ ' + issues.join(' · ');
    el.style.color = '#ff8800'; el.style.borderColor = '#ff880044';
  }
}

// ── HIT TESTING (world coords) ─────────────────────────────
function nodeAt(wx, wy) {
  const r = 16 / viewScale; // hit radius grows when zoomed out
  const rr = Math.max(12, Math.min(r, 24));
  for (const n of nodes) {
    const dx = wx - n.x, dy = wy - n.y;
    if (dx*dx + dy*dy <= rr*rr) return n;
  }
  return null;
}

function edgeNear(wx, wy) {
  const threshold = (7 / viewScale);
  for (const e of edges) {
    const pts = edgePts(e);
    for (let i = 0; i < pts.length - 2; i += 2) {
      const x1=pts[i],y1=pts[i+1],x2=pts[i+2],y2=pts[i+3];
      const dx=x2-x1,dy=y2-y1,len2=dx*dx+dy*dy;
      if (len2 < 1) continue;
      const t = Math.max(0,Math.min(1,((wx-x1)*dx+(wy-y1)*dy)/len2));
      const px=x1+t*dx-wx, py=y1+t*dy-wy;
      if (px*px+py*py < threshold*threshold) return e;
    }
  }
  return null;
}

// ── EDGE GEOMETRY ──────────────────────────────────────────
function edgePts(e) {
  const from = nodes.find(n => n.id === e.from);
  const to   = nodes.find(n => n.id === e.to);
  if (!from || !to) return [];
  if (e.wayY == null) return [from.x, from.y, to.x, to.y];
  const wy = e.wayY;
  const dyfrom = Math.abs(wy - from.y);
  const xmid1  = from.x + Math.min(dyfrom, BEVEL) * Math.sign(to.x - from.x);
  const dyto   = Math.abs(wy - to.y);
  const xmid2  = to.x - Math.min(dyto, BEVEL) * Math.sign(to.x - from.x);
  return [from.x, from.y, xmid1, wy, xmid2, wy, to.x, to.y];
}

function polylinePts(e) {
  const flat = edgePts(e);
  const pts = [];
  for (let i = 0; i < flat.length; i += 2) pts.push({ x: flat[i], y: flat[i+1] });
  return pts;
}
function polylineLength(pts) {
  let len = 0;
  for (let i = 1; i < pts.length; i++) {
    const dx=pts[i].x-pts[i-1].x, dy=pts[i].y-pts[i-1].y;
    len += Math.sqrt(dx*dx+dy*dy);
  }
  return len;
}
function posOnEdge(t, e) {
  const pts = polylinePts(e);
  const total = polylineLength(pts);
  let dist = t * total;
  for (let i = 1; i < pts.length; i++) {
    const dx=pts[i].x-pts[i-1].x, dy=pts[i].y-pts[i-1].y;
    const segLen = Math.sqrt(dx*dx+dy*dy);
    if (dist <= segLen || i === pts.length-1) {
      const tt = segLen > 0 ? dist/segLen : 0;
      return { x: pts[i-1].x+tt*dx, y: pts[i-1].y+tt*dy };
    }
    dist -= segLen;
  }
  return pts[pts.length-1];
}

function checkParallel(newEdge) {
  const parallel = edges.filter(e =>
    e.id !== newEdge.id &&
    ((e.from===newEdge.from && e.to===newEdge.to) ||
     (e.from===newEdge.to   && e.to===newEdge.from))
  );
  if (parallel.length > 0) {
    const from = nodes.find(n => n.id === newEdge.from);
    if (from) newEdge.wayY = from.y - 60;
  }
}

// ── MOUSE EVENTS ───────────────────────────────────────────
let mousePos = { x: 0, y: 0 }; // screen coords

canvas.addEventListener('mousedown', e => {
  // Middle mouse or Space = pan
  if (e.button === 1 || (e.button === 0 && spaceHeld)) {
    e.preventDefault();
    panning = true;
    panStart = { x: e.clientX - viewX, y: e.clientY - viewY };
    canvas.style.cursor = 'grabbing';
    return;
  }
  if (e.button !== 0) return;

  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  const w = screenToWorld(sx, sy);
  const wx = w.x, wy = w.y;
  const sx2 = snap(wx), sy2 = snap(wy);
  const hit = nodeAt(wx, wy);
  const hitEdge = hit ? null : edgeNear(wx, wy);

  if (tool === 'select') {
    if (hit && selectedNodes.length > 0 && selectedNodes.some(n => n.id === hit.id)) {
      // Clic sur un nœud de la multi-sélection → déplacer tout le groupe
      saveUndo();
      const selIds = new Set(selectedNodes.map(n => n.id));
      multiDragging = {
        startX: wx, startY: wy,
        origNodes: selectedNodes.map(n => ({ node: n, x: n.x, y: n.y })),
        origEdgeWayY: edges
          .filter(e => selIds.has(e.from) && selIds.has(e.to) && e.wayY != null)
          .map(e => ({ edge: e, wayY: e.wayY }))
      };
    } else if (hit) {
      selectedNode = hit; selectedEdge = null; selectedNodes = [];
      dragging = { node: hit, ox: wx - hit.x, oy: wy - hit.y };
      buildProps();
    } else if (hitEdge) {
      selectedNode = null; selectedEdge = hitEdge; selectedNodes = [];
      buildProps();
    } else if (e.ctrlKey || e.metaKey) {
      // Ctrl + drag sur espace vide → rectangle de sélection
      selectedNode = null; selectedEdge = null; selectedNodes = [];
      selectionRect = { sx: wx, sy: wy, ex: wx, ey: wy };
      buildProps();
    } else {
      // Drag sur espace vide → pan
      selectedNode = null; selectedEdge = null; selectedNodes = [];
      panning = true;
      panStart = { x: e.clientX - viewX, y: e.clientY - viewY };
      canvas.style.cursor = 'grabbing';
      buildProps();
    }

  } else if (tool === 'node') {
    if (hit) {
      // nothing — don't place on existing node
    } else if (hitEdge) {
      // Split edge: insert node at click position
      saveUndo();
      const id = nextNodeId++;
      const n = { id, ...getNodeMeta(), x: sx2, y: sy2 };
      nodes.push(n);
      // First segment inherits all properties of the original edge
      const e1 = { id: nextEdgeId++, from: hitEdge.from, to: id,
        wayY: hitEdge.wayY ?? null, switch: hitEdge.switch ?? null,
        resistance: !!hitEdge.resistance, resDuration: hitEdge.resDuration,
        micro: !!hitEdge.micro, microDuration: hitEdge.microDuration };
      // Second segment: plain wire
      const e2 = { id: nextEdgeId++, from: id, to: hitEdge.to,
        wayY: null, switch: null, resistance: false, micro: false };
      edges = edges.filter(ed => ed.id !== hitEdge.id);
      edges.push(e1, e2);
      selectedNode = n; selectedEdge = null;
      buildProps(); validate(); flash(tr('flash.node.insert'));
    } else {
      saveUndo();
      const id = nextNodeId++;
      const n = { id, ...getNodeMeta(), x: sx2, y: sy2 };
      nodes.push(n);
      selectedNode = n; selectedEdge = null;
      buildProps(); validate();
    }

  } else if (tool === 'wire') {
    saveUndo();
    // Résoudre la cible : nœud existant, nœud inséré sur un fil, ou nouveau nœud créé sur place
    let target = hit;
    if (!target && hitEdge) {
      // Même comportement qu'en mode node : séparer le fil en deux
      const id = nextNodeId++;
      target = { id, ...getNodeMeta(), x: sx2, y: sy2 };
      nodes.push(target);
      const e1 = { id: nextEdgeId++, from: hitEdge.from, to: id,
        wayY: hitEdge.wayY ?? null, switch: hitEdge.switch ?? null,
        resistance: !!hitEdge.resistance, resDuration: hitEdge.resDuration,
        micro: !!hitEdge.micro, microDuration: hitEdge.microDuration };
      const e2 = { id: nextEdgeId++, from: id, to: hitEdge.to,
        wayY: null, switch: null, resistance: false, micro: false };
      edges = edges.filter(ed => ed.id !== hitEdge.id);
      edges.push(e1, e2);
    } else if (!target) {
      const id = nextNodeId++;
      target = { id, ...getNodeMeta(), x: sx2, y: sy2 };
      nodes.push(target);
    }

    if (wireFrom === null) {
      wireFrom = target;
      flash(tr('flash.wire.dest'));
    } else if (target.id !== wireFrom.id) {
      const id = nextEdgeId++;
      const ne = { id, from: wireFrom.id, to: target.id, wayY: null, switch: null };
      checkParallel(ne);
      edges.push(ne);
      selectedEdge = ne; selectedNode = null;
      wireFrom = target;
      flash(tr('flash.wire.done'));
    }
    buildProps(); validate();

  } else if (tool === 'delete') {
    deleteHit(hit, hitEdge);
  }
});

function deleteHit(hit, hitEdge) {
  if (hit) {
    saveUndo();
    nodes = nodes.filter(n => n.id !== hit.id);
    edges = edges.filter(ed => ed.from !== hit.id && ed.to !== hit.id);
    if (selectedNode?.id === hit.id) selectedNode = null;
    buildProps(); validate(); flash(tr('flash.node.del'));
  } else if (hitEdge) {
    saveUndo();
    edges = edges.filter(ed => ed.id !== hitEdge.id);
    if (selectedEdge?.id === hitEdge.id) selectedEdge = null;
    buildProps(); validate(); flash(tr('flash.wire.del'));
  }
}

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mousePos = { x: e.clientX - rect.left, y: e.clientY - rect.top };

  if (panning && panStart) {
    viewX = e.clientX - panStart.x;
    viewY = e.clientY - panStart.y;
    return;
  }
  if (multiDragging) {
    const w = screenToWorld(mousePos.x, mousePos.y);
    const dx = w.x - multiDragging.startX;
    const dy = w.y - multiDragging.startY;
    for (const { node, x, y } of multiDragging.origNodes) {
      node.x = snap(x + dx);
      node.y = snap(y + dy);
    }
    for (const { edge, wayY } of multiDragging.origEdgeWayY) {
      edge.wayY = snap(wayY + dy);
    }
    validate();
    return;
  }
  if (dragging) {
    const w = screenToWorld(mousePos.x, mousePos.y);
    dragging.node.x = snap(w.x - dragging.ox + GRID/2);
    dragging.node.y = snap(w.y - dragging.oy + GRID/2);
    validate();
    return;
  }
  if (selectionRect) {
    const w = screenToWorld(mousePos.x, mousePos.y);
    selectionRect.ex = w.x;
    selectionRect.ey = w.y;
    return;
  }
  const w = screenToWorld(mousePos.x, mousePos.y);
  hoveredNode = nodeAt(w.x, w.y);
  hoveredEdge = hoveredNode ? null : edgeNear(w.x, w.y);

  if (spaceHeld || panning) canvas.style.cursor = 'grab';
  else if (hoveredNode) canvas.style.cursor = tool === 'delete' ? 'not-allowed' : 'grab';
  else canvas.style.cursor = 'crosshair';
});

canvas.addEventListener('mouseup', e => {
  if (panning) { panning = false; canvas.style.cursor = spaceHeld ? 'grab' : 'crosshair'; }
  dragging = null;
  multiDragging = null;
  panStart = null;
  if (selectionRect) {
    const r = selectionRect;
    const minX = Math.min(r.sx, r.ex), maxX = Math.max(r.sx, r.ex);
    const minY = Math.min(r.sy, r.ey), maxY = Math.max(r.sy, r.ey);
    const inRect = nodes.filter(n => n.x >= minX && n.x <= maxX && n.y >= minY && n.y <= maxY);
    selectionRect = null;
    if (inRect.length === 1) {
      // single node → sélection normale
      selectedNode = inRect[0]; selectedEdge = null; selectedNodes = [];
    } else if (inRect.length > 1) {
      selectedNodes = inRect; selectedNode = null; selectedEdge = null;
    }
    buildProps();
  }
});
canvas.addEventListener('mouseleave', () => {
  panning = false; dragging = null; multiDragging = null; panStart = null;
  selectionRect = null;
  hoveredNode = null; hoveredEdge = null;
});

// Zoom with scroll
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  const newScale = Math.max(0.15, Math.min(4, viewScale * factor));
  // Zoom toward mouse position
  viewX = sx - (sx - viewX) * (newScale / viewScale);
  viewY = sy - (sy - viewY) * (newScale / viewScale);
  viewScale = newScale;
  document.getElementById('zoom-label').textContent = Math.round(viewScale * 100) + '%';
}, { passive: false });

// Right-click: delete if hit, deselect if empty
canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const w = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
  const hit = nodeAt(w.x, w.y);
  const hitEdge = hit ? null : edgeNear(w.x, w.y);
  if (!hit && !hitEdge) {
    wireFrom = null; selectedNode = null; selectedEdge = null; selectedNodes = []; buildProps();
  } else {
    deleteHit(hit, hitEdge);
  }
});

// Ctrl+double-click: select entire connected component from node or wire
function selectConnectedComponent(startNodeId) {
  const visitedNodes = new Set([startNodeId]);
  const queue = [startNodeId];
  while (queue.length > 0) {
    const nid = queue.shift();
    for (const ed of edges) {
      if (ed.from === nid && !visitedNodes.has(ed.to)) {
        visitedNodes.add(ed.to); queue.push(ed.to);
      } else if (ed.to === nid && !visitedNodes.has(ed.from)) {
        visitedNodes.add(ed.from); queue.push(ed.from);
      }
    }
  }
  selectedNodes = nodes.filter(n => visitedNodes.has(n.id));
  selectedNode = null; selectedEdge = null;
  buildProps();
  const lang = document.documentElement.lang || 'fr';
  flash(lang === 'en'
    ? `${selectedNodes.length} nodes selected`
    : `${selectedNodes.length} nœuds sélectionnés`);
}

// Double-click add node (or split edge)
canvas.addEventListener('dblclick', e => {
  const rect = canvas.getBoundingClientRect();
  const w = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
  const hit = nodeAt(w.x, w.y);
  const hitEdge = hit ? null : edgeNear(w.x, w.y);

  // Ctrl+dblclick → select connected component
  if (e.ctrlKey || e.metaKey) {
    if (hit) { selectConnectedComponent(hit.id); }
    else if (hitEdge) { selectConnectedComponent(hitEdge.from); }
    return;
  }

  if (tool !== 'select' && tool !== 'node') return;
  if (hit) return;
  const sx2 = snap(w.x), sy2 = snap(w.y);
  saveUndo();
  const id = nextNodeId++;
  const n = { id, ...getNodeMeta(), x: sx2, y: sy2 };
  nodes.push(n);
  if (hitEdge) {
    const e1 = { id: nextEdgeId++, from: hitEdge.from, to: id,
      wayY: hitEdge.wayY ?? null, switch: hitEdge.switch ?? null,
      resistance: !!hitEdge.resistance, resDuration: hitEdge.resDuration,
      inductance: !!hitEdge.inductance, indDuration: hitEdge.indDuration,
      micro: !!hitEdge.micro, microDuration: hitEdge.microDuration };
    const e2 = { id: nextEdgeId++, from: id, to: hitEdge.to,
      wayY: null, switch: null, resistance: false, inductance: false, micro: false };
    edges = edges.filter(ed => ed.id !== hitEdge.id);
    edges.push(e1, e2);
    flash(tr('flash.node.insert'));
  } else {
    flash(tr('flash.node.add'));
  }
  selectedNode = n; selectedEdge = null;
  buildProps(); validate();
});

// ── DOC MODAL ──────────────────────────────────────────────
function buildDocHTML() {
  const fr = currentLang !== 'en';
  const k = (f, e) => fr ? f : e;

function openDoc() {
  document.getElementById('doc-header').querySelector('h2').textContent =
    currentLang === 'en' ? '📖 Help — Level Editor' : '📖 Aide — Éditeur de niveaux';
  document.getElementById('doc-body').innerHTML = buildDocHTML();
  document.getElementById('doc-overlay').classList.add('visible');
}
function closeDoc() {
  document.getElementById('doc-overlay').classList.remove('visible');
}
document.getElementById('doc-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('doc-overlay')) closeDoc();
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('doc-overlay').classList.contains('visible')) {
    closeDoc(); return;
  }
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === ' ') { e.preventDefault(); spaceHeld = true; canvas.style.cursor = 'grab'; return; }
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
    e.preventDefault();
    if (e.shiftKey) redo(); else undo();
    return;
  }
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'c') { e.preventDefault(); copySelection(); return; }
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'v') { e.preventDefault(); pasteSelection(); return; }
  if (e.key === 'Delete' || e.key === 'Backspace') {
    e.preventDefault();
    if (selectedNodes.length > 0) {
      saveUndo();
      const ids = new Set(selectedNodes.map(n => n.id));
      nodes = nodes.filter(n => !ids.has(n.id));
      edges = edges.filter(ed => !ids.has(ed.from) && !ids.has(ed.to));
      const count = ids.size;
      selectedNodes = []; buildProps(); validate();
      flash(count + ' ' + tr('flash.multi.del'));
    } else if (selectedNode) {
      saveUndo();
      nodes = nodes.filter(n => n.id !== selectedNode.id);
      edges = edges.filter(ed => ed.from !== selectedNode.id && ed.to !== selectedNode.id);
      selectedNode = null; buildProps(); validate(); flash(tr('flash.node.del.key'));
    } else if (selectedEdge) {
      saveUndo();
      edges = edges.filter(ed => ed.id !== selectedEdge.id);
      selectedEdge = null; buildProps(); validate(); flash(tr('flash.wire.del.key'));
    }
    return;
  }
  if (e.key === 'Escape') {
    wireFrom = null; selectedNode = null; selectedEdge = null; selectedNodes = []; selectionRect = null;
    buildProps();
    return;
  }
  if (e.key === 'f' || e.key === 'F') { fitView(); return; }
  if (!e.ctrlKey && !e.metaKey && !e.altKey) {
    switch (e.key.toUpperCase()) {
      case 'S': setTool('select'); break;
      case 'N': setTool('node');   break;
      case 'W': setTool('wire');   break;
      case 'D': setTool('delete'); break;
      case 'X':
      case 'Y': {
        const sel = selectedNodes.length > 1 ? selectedNodes : null;
        if (!sel) break;
        saveUndo();
        const xs = sel.map(n => n.x), ys = sel.map(n => n.y);
        const cx = (Math.min(...xs) + Math.max(...xs)) / 2;
        const cy = (Math.min(...ys) + Math.max(...ys)) / 2;
        const selIds = new Set(sel.map(n => n.id));
        if (e.key.toUpperCase() === 'X') {
          // Symétrie axe vertical — flip gauche/droite
          sel.forEach(n => { n.x = 2 * cx - n.x; });
          edges.forEach(ed => {
            if (selIds.has(ed.from) && selIds.has(ed.to) && ed.wayY != null)
              ed.wayY = 2 * cy - ed.wayY;
          });
          flash('↔ Symétrie verticale');
        } else {
          // Symétrie axe horizontal — flip haut/bas
          sel.forEach(n => { n.y = 2 * cy - n.y; });
          edges.forEach(ed => {
            if (selIds.has(ed.from) && selIds.has(ed.to) && ed.wayY != null)
              ed.wayY = 2 * cy - ed.wayY;
          });
          flash('↕ Symétrie horizontale');
        }
        validate();
        break;
      }
    }
  }
});
document.addEventListener('keyup', e => {
  if (e.key === ' ') {
    spaceHeld = false; panning = false; panStart = null;
    canvas.style.cursor = 'crosshair';
  }
});

// ── FIT VIEW ───────────────────────────────────────────────
function fitView() {
  if (!nodes.length) return;
  const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
  const minX = Math.min(...xs) - 60, maxX = Math.max(...xs) + 60;
  const minY = Math.min(...ys) - 60, maxY = Math.max(...ys) + 60;
  const ww = maxX - minX, wh = maxY - minY;
  if (ww <= 0 || wh <= 0) return;
  const s = Math.min(4, Math.min(VW / ww, VH / wh)) * 0.9;
  viewScale = s;
  viewX = VW/2 - (minX + ww/2) * s;
  viewY = VH/2 - (minY + wh/2) * s;
  document.getElementById('zoom-label').textContent = Math.round(viewScale * 100) + '%';
}

    function ntypeStyle(t) {
      if (n.type !== t) return '';
      return { source:'border-color:#ffaa00;color:#ffaa00;background:#2a1a00;box-shadow:0 0 8px #ffaa0044',
               node:'border-color:#00cc88;color:#00cc88;background:#001a12',
               bulb:'border-color:#cc44ff;color:#cc44ff;background:#1a0030;box-shadow:0 0 8px #cc44ff44',
               teleporter:'border-color:#00ffcc;color:#00ffcc;background:#0d2a1e;box-shadow:0 0 8px #00ffcc44' }[t] || '';
    }
    panel.innerHTML = `
      <span id="props-title">${tr('props.node')}${n.id}</span>
      <div class="prop-group">
        <div class="prop-group-label">${tr('props.type')}</div>
        <div class="prop-btns">
          <button class="prop-btn pnt-btn" id="pnt-source"     style="${ntypeStyle('source')}"     title="Source">⚡</button>
          <button class="prop-btn pnt-btn" id="pnt-node"       style="${ntypeStyle('node')}"       title="Junction">●</button>
          <button class="prop-btn pnt-btn" id="pnt-bulb"       style="${ntypeStyle('bulb')}"       title="Ampoule">💡</button>
          <button class="prop-btn pnt-btn" id="pnt-teleporter" style="${ntypeStyle('teleporter')}" title="Téléporteur">🌀</button>
        </div>
      </div>
      ${n.type==='teleporter' ? `
      <div class="prop-sep-v"></div>
      <div class="prop-group">
        <div class="prop-group-label">Groupe</div>
        <div class="prop-btns">
          ${Object.entries(TP_COLORS).map(([g,c]) => {
            const act = n.group===g ? `border-color:${c};color:${c};background:#0a1a14;box-shadow:0 0 10px ${c}66` : '';
            return `<button class="prop-btn ptg-btn" id="ptg-${g}" data-grp="${g}" data-color="${c}" style="${act}">${g}</button>`;
          }).join('')}
        </div>
      </div>` : ''}
      <label>${tr('props.x')} <input id="p-nx" type="number" value="${n.x}" step="20"></label>
      <label>${tr('props.y')} <input id="p-ny" type="number" value="${n.y}" step="20"></label>
    `;

      document.getElementById('pnt-'+t).onclick = () => { saveUndo(); n.type = t; if (t==='teleporter' && !n.group) n.group='A'; validate(); buildProps(); };
    });
    document.querySelectorAll('.ptg-btn').forEach(btn => {
      btn.onclick = () => { saveUndo(); n.group = btn.dataset.grp; validate(); buildProps(); };
    });
    document.getElementById('p-nx').oninput = ev => { n.x = snap(+ev.target.value); };
    document.getElementById('p-ny').oninput = ev => { n.y = snap(+ev.target.value); };

  } else if (selectedEdge) {
    const ed = selectedEdge;
    const swKey  = ed.switch?.key      ?? 'none';
    const swOpen = ed.switch?.initOpen ?? true;
    const hasRes  = !!ed.resistance;
    const resDur  = ed.resDuration ?? 3;
    const hasInd  = !!ed.inductance;
    const indDur  = ed.indDuration ?? 2;
    const hasMicro = !!ed.micro;
    const microDur = ed.microDuration ?? 5;
    const wayYVal = ed.wayY != null ? ed.wayY : '';

    panel.innerHTML = `

      <button class="prop-btn" id="p-rev-btn" title="Swap from↔to">${tr('props.reverse')}</button>

        <div class="prop-group-label">${tr('props.switch')}</div>

    document.getElementById('p-micro-btn').onclick = () => {
      saveUndo();
      ed.micro = !ed.micro;
      buildProps(); validate();
    };
    const microDurInput = document.getElementById('p-micro-dur');
    if (microDurInput) microDurInput.oninput = ev => {
      ed.microDuration = Math.max(1, +ev.target.value);
    };

    // wayY
    document.getElementById('p-wayY').oninput = ev => {
      ed.wayY = ev.target.value.trim() === '' ? null : snap(+ev.target.value);
    };

  } else {
    panel.innerHTML = `<span style="color:#1a5a3a;font-size:11px">${tr('props.hint')}</span>`;
  }
}

// ── DRAWING ────────────────────────────────────────────────
const KEY_COLOR = {
  Q: { main: '#ffaa00', glow: '#ff6600' },
  P: { main: '#cc44ff', glow: '#8800ff' },
};
function keyColor(key) { return KEY_COLOR[key] || { main: '#00ffcc', glow: '#00ffcc' }; }

function drawGrid() {
  // Adaptive grid: show sub-grid at high zoom
  const step = GRID;
  const startX = Math.floor((-viewX / viewScale) / step) * step;
  const startY = Math.floor((-viewY / viewScale) / step) * step;
  const endX = startX + VW / viewScale + step * 2;
  const endY = startY + VH / viewScale + step * 2;

  ctx.save();
  ctx.strokeStyle = '#0d1c18';
  ctx.lineWidth = 0.5 / viewScale;
  for (let x = startX; x <= endX; x += step) {
    ctx.beginPath(); ctx.moveTo(x, startY); ctx.lineTo(x, endY); ctx.stroke();
  }
  for (let y = startY; y <= endY; y += step) {
    ctx.beginPath(); ctx.moveTo(startX, y); ctx.lineTo(endX, y); ctx.stroke();
  }
  // Brighter every 5 steps
  ctx.strokeStyle = '#122018';
  for (let x = Math.floor(startX/(step*5))*(step*5); x <= endX; x += step*5) {
    ctx.beginPath(); ctx.moveTo(x, startY); ctx.lineTo(x, endY); ctx.stroke();
  }
  for (let y = Math.floor(startY/(step*5))*(step*5); y <= endY; y += step*5) {
    ctx.beginPath(); ctx.moveTo(startX, y); ctx.lineTo(endX, y); ctx.stroke();
  }
  ctx.restore();
}

function drawEdge(e, selected, hovered) {
  const pts = edgePts(e);
  if (pts.length < 4) return;
  const c = selected ? '#00ffcc' : hovered ? '#4aaa70' : '#2a6a50';
  const lw = (selected ? 3 : 2) / viewScale;
  ctx.save();
  if (selected) { ctx.shadowBlur = 10; ctx.shadowColor = c; }
  else if (hovered) { ctx.shadowBlur = 5; ctx.shadowColor = c; }
  ctx.strokeStyle = c; ctx.lineWidth = lw;
  ctx.beginPath();
  ctx.moveTo(pts[0], pts[1]);
  for (let i = 2; i < pts.length; i += 2) ctx.lineTo(pts[i], pts[i+1]);
  ctx.stroke();
  ctx.restore();

  // Direction arrow
  const mid = posOnEdge(0.5, e);
  const a = posOnEdge(0.48, e), b = posOnEdge(0.52, e);
  const angle = Math.atan2(b.y-a.y, b.x-a.x);
  const arr = 7 / viewScale;
  ctx.save();
  ctx.translate(mid.x, mid.y); ctx.rotate(angle);
  ctx.fillStyle = c;
  ctx.beginPath();
  ctx.moveTo(arr, 0); ctx.lineTo(-arr*0.6, -arr*0.55); ctx.lineTo(-arr*0.6, arr*0.55);
  ctx.closePath(); ctx.fill();
  ctx.restore();

  // Switch
  if (e.switch) {
    const sp = posOnEdge(0.5, e);
    const sc = keyColor(e.switch.key);
    const s = 8 / viewScale;
    ctx.save();
    ctx.strokeStyle = sc.main; ctx.lineWidth = 2/viewScale;
    ctx.shadowBlur = 8; ctx.shadowColor = sc.main;
    if (e.switch.initOpen) {
      ctx.beginPath();
      ctx.moveTo(sp.x, sp.y-s); ctx.lineTo(sp.x+s, sp.y);
      ctx.lineTo(sp.x, sp.y+s); ctx.lineTo(sp.x-s, sp.y);
      ctx.closePath(); ctx.stroke();
    } else {
      ctx.beginPath(); ctx.arc(sp.x, sp.y, s, 0, Math.PI*2); ctx.stroke();
    }
    ctx.shadowBlur = 0;
    ctx.font = `bold ${11/viewScale}px Courier New`; ctx.textAlign = 'center';
    ctx.fillStyle = sc.main;
    ctx.fillText(e.switch.key, sp.x, sp.y + s*2.2);
    ctx.restore();
  }

  // Resistance
  if (e.resistance) {
    const sp  = posOnEdge(0.5, e);
    const sp1 = posOnEdge(0.48, e), sp2 = posOnEdge(0.52, e);
    const angle2 = Math.atan2(sp2.y-sp1.y, sp2.x-sp1.x);
    const RW = 46/viewScale, RH = 12/viewScale;
    const dur = e.resDuration ?? 3;
    const bandColors = ['#ff3333','#ff8800','#ffee00','#4488ff'];
    ctx.save();
    ctx.translate(sp.x, sp.y); ctx.rotate(angle2);
    ctx.fillStyle = '#2a1a00';
    ctx.strokeStyle = '#cc8800'; ctx.lineWidth = 2/viewScale;
    ctx.shadowBlur = 8; ctx.shadowColor = '#cc8800';
    ctx.fillRect(-RW, -RH, RW*2, RH*2);
    ctx.strokeRect(-RW, -RH, RW*2, RH*2);
    ctx.save();
    ctx.beginPath(); ctx.rect(-RW+1/viewScale, -RH+1/viewScale, RW*2-2/viewScale, RH*2-2/viewScale); ctx.clip();
    const nB=4, bW=6/viewScale;
    const sp3=(RW*2-nB*bW)/(nB+1);
    for (let i=0;i<nB;i++) {
      const bx=-RW+sp3*(i+1)+bW*i;
      ctx.fillStyle=bandColors[i]; ctx.globalAlpha=0.7;
      ctx.fillRect(bx,-RH,bW,RH*2);
    }
    ctx.globalAlpha=1; ctx.restore();
    ctx.strokeStyle='#cc8800'; ctx.lineWidth=3/viewScale; ctx.shadowBlur=6;
    ctx.beginPath(); ctx.moveTo(-50/viewScale,0); ctx.lineTo(-RW,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(RW,0); ctx.lineTo(50/viewScale,0); ctx.stroke();
    ctx.rotate(-angle2);
    ctx.shadowBlur=0; ctx.font=`bold ${10/viewScale}px Courier New`; ctx.textAlign='center';
    ctx.fillStyle='#cc8800';
    ctx.fillText('R '+dur+'s', 0, RH+14/viewScale);
    ctx.restore();
  }

  // Inductance (coil)
  if (e.inductance) {
    const sp  = posOnEdge(0.5, e);
    const sp1 = posOnEdge(0.48, e), sp2 = posOnEdge(0.52, e);
    const angle2 = Math.atan2(sp2.y-sp1.y, sp2.x-sp1.x);
    const LW = 40/viewScale, LH = 11/viewScale;
    const dur = e.indDuration ?? 2;
    ctx.save();
    ctx.translate(sp.x, sp.y); ctx.rotate(angle2);
    // Stubs
    ctx.strokeStyle = '#aa44ff'; ctx.lineWidth = 2/viewScale;
    ctx.shadowBlur = 6; ctx.shadowColor = '#8822cc';
    ctx.beginPath(); ctx.moveTo(-LW-8/viewScale, 0); ctx.lineTo(-LW, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(LW, 0); ctx.lineTo(LW+8/viewScale, 0); ctx.stroke();
    // Coil bumps (4 arcs)
    ctx.shadowBlur = 8;
    const nBumps = 4, bW = LW*2/nBumps;
    for (let i = 0; i < nBumps; i++) {
      const bx = -LW + bW*i + bW/2;
      ctx.beginPath(); ctx.arc(bx, 0, bW/2, Math.PI, 0); ctx.stroke();
    }
    ctx.rotate(-angle2);
    ctx.shadowBlur = 0; ctx.font = `bold ${10/viewScale}px Courier New`; ctx.textAlign = 'center';
    ctx.fillStyle = '#cc66ff';
    ctx.fillText('L ' + dur + 's', 0, LH + 14/viewScale);
    ctx.restore();
  }

  // Microprocesseur
  if (e.micro) {
    const sp  = posOnEdge(0.5, e);
    const sp1 = posOnEdge(0.48, e), sp2 = posOnEdge(0.52, e);
    const angle2 = Math.atan2(sp2.y-sp1.y, sp2.x-sp1.x);
    const MW = 26/viewScale, MH = 18/viewScale;
    const dur = e.microDuration ?? 5;
    ctx.save();
    ctx.translate(sp.x, sp.y); ctx.rotate(angle2);
    // Stubs
    ctx.strokeStyle = '#0077dd'; ctx.lineWidth = 2/viewScale;
    ctx.shadowBlur = 6; ctx.shadowColor = '#0055aa';
    ctx.beginPath(); ctx.moveTo(-32/viewScale, 0); ctx.lineTo(-MW, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(MW, 0); ctx.lineTo(32/viewScale, 0); ctx.stroke();
    // Corps
    ctx.fillStyle = '#000c1a'; ctx.strokeStyle = '#0077dd'; ctx.lineWidth = 2/viewScale;
    ctx.shadowBlur = 10; ctx.shadowColor = '#0055aa';
    ctx.fillRect(-MW, -MH, MW*2, MH*2);
    ctx.strokeRect(-MW, -MH, MW*2, MH*2);
    // Picots
    ctx.shadowBlur = 0; ctx.lineWidth = 1.5/viewScale;
    for (let i = 0; i < 3; i++) {
      const py = -MH + MH * (2*(i+1)/4);
      ctx.beginPath(); ctx.moveTo(-MW, py); ctx.lineTo(-MW-6/viewScale, py); ctx.stroke();
      ctx.beginPath(); ctx.moveTo( MW, py); ctx.lineTo( MW+6/viewScale, py); ctx.stroke();
    }
    // Label
    ctx.rotate(-angle2);
    ctx.shadowBlur = 0; ctx.font = `bold ${10/viewScale}px Courier New`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#00aaff';
    ctx.fillText('μP', 0, 0);
    ctx.fillStyle = '#0077dd'; ctx.textBaseline = 'alphabetic';
    ctx.fillText('⏱' + dur + 's', 0, MH + 14/viewScale);
    ctx.restore();
  }

  // wayY dashed line indicator
  if (e.wayY != null && selected) {
    const from = nodes.find(n => n.id === e.from);
    if (from) {
      ctx.save();
      ctx.strokeStyle = '#334455'; ctx.lineWidth = 1/viewScale;
      ctx.setLineDash([3/viewScale, 4/viewScale]);
      ctx.beginPath();
      ctx.moveTo(Math.min(...nodes.map(n=>n.x))-100, e.wayY);
      ctx.lineTo(Math.max(...nodes.map(n=>n.x))+100, e.wayY);
      ctx.stroke();
      ctx.restore();
    }
  }
}

function drawNode(n, selected, hovered) {
  const { x, y, type } = n;
  ctx.save();

  if (type === 'source') {
    const sz = 14/viewScale, sh = 18/viewScale;
    ctx.shadowBlur = selected ? 18 : hovered ? 14 : 10;
    ctx.shadowColor = '#00ffcc';
    ctx.strokeStyle = selected ? '#00ffff' : hovered ? '#66ffdd' : '#00ffcc';
    ctx.lineWidth = 2/viewScale;
    ctx.strokeRect(x-sz, y-sh, sz*2, sh*2);
    ctx.fillStyle = selected ? '#00ffee' : '#00ffcc';
    ctx.font = `bold ${16/viewScale}px Courier New`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('⚡', x, y);

  } else if (type === 'bulb') {
    const r = 16/viewScale;
    ctx.shadowBlur = selected ? 20 : hovered ? 14 : 10;
    ctx.shadowColor = '#ffff00';
    ctx.strokeStyle = selected ? '#ffff55' : hovered ? '#ffff77' : '#ffdd00';
    ctx.lineWidth = 2/viewScale;
    ctx.beginPath(); ctx.arc(x, y-r, r, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = selected ? '#333300' : '#1a2a1a'; ctx.fill();
    ctx.fillStyle = selected ? '#cccc88' : '#334433';
    ctx.fillRect(x-9/viewScale, y, 18/viewScale, 10/viewScale);
    ctx.fillRect(x-6/viewScale, y+10/viewScale, 12/viewScale, 5/viewScale);
    ctx.font = `${10/viewScale}px Courier New`; ctx.textAlign='center'; ctx.fillStyle='#ffdd00';
    ctx.fillText('💡', x, y);

  } else if (type === 'teleporter') {
    const TP_COLORS = { A:'#00ffcc', B:'#ff7700', C:'#cc44ff', D:'#44ff88', E:'#ff4466', F:'#ffcc00' };
    const col = TP_COLORS[n.group] || '#aaaaaa';
    const r = 16/viewScale;
    ctx.shadowBlur = selected ? 22 : hovered ? 16 : 10;
    ctx.shadowColor = col;
    ctx.strokeStyle = selected ? '#ffffff' : col;
    ctx.lineWidth = (selected ? 2.5 : 2) / viewScale;
    // Outer ring
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.stroke();
    // Inner ring
    ctx.globalAlpha = 0.4;
    ctx.beginPath(); ctx.arc(x, y, r*0.55, 0, Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 1;
    // Center dot
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(x, y, 3.5/viewScale, 0, Math.PI*2); ctx.fill();
    // Group letter
    ctx.font = `bold ${11/viewScale}px Courier New`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = col; ctx.shadowBlur = 4;
    ctx.fillText(n.group || '?', x, y - r - 8/viewScale);
  } else {
    const r = selected ? 8/viewScale : hovered ? 7/viewScale : 6/viewScale;
    ctx.shadowBlur = selected ? 14 : hovered ? 10 : 6;
    ctx.shadowColor = '#00ffcc';
    ctx.fillStyle = selected ? '#00ffff' : hovered ? '#66ffdd' : '#00ffcc';
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
  }

  ctx.shadowBlur = 0;
  ctx.font = `9px Courier New`; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillStyle = '#446655';
  ctx.fillText('#'+n.id, x, y + 20/viewScale);
  ctx.restore();
}

function drawWirePreview() {
  if (tool !== 'wire' || !wireFrom) return;
  const w = screenToWorld(mousePos.x, mousePos.y);
  ctx.save();
  ctx.strokeStyle = '#00ffcc66'; ctx.lineWidth = 1.5/viewScale;
  ctx.setLineDash([5/viewScale, 5/viewScale]);
  ctx.beginPath(); ctx.moveTo(wireFrom.x, wireFrom.y); ctx.lineTo(w.x, w.y); ctx.stroke();
  ctx.restore();
  ctx.save();
  ctx.shadowBlur = 16; ctx.shadowColor = '#00ffcc';
  ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 2/viewScale;
  ctx.beginPath(); ctx.arc(wireFrom.x, wireFrom.y, 10/viewScale, 0, Math.PI*2); ctx.stroke();
  ctx.restore();
}

// ── MINIMAP ────────────────────────────────────────────────
function drawMinimap() {
  if (!nodes.length) return;
  const mW = 160, mH = 100;
  mmCtx.clearRect(0, 0, mW, mH);
  mmCtx.fillStyle = '#08080f';
  mmCtx.fillRect(0, 0, mW, mH);

  const xs = nodes.map(n=>n.x), ys = nodes.map(n=>n.y);
  const minX = Math.min(...xs)-60, maxX = Math.max(...xs)+60;
  const minY = Math.min(...ys)-60, maxY = Math.max(...ys)+60;
  const ww = maxX-minX || 1, wh = maxY-minY || 1;
  const ms = Math.min(mW/ww, mH/wh)*0.85;
  const mox = mW/2 - (minX+ww/2)*ms;
  const moy = mH/2 - (minY+wh/2)*ms;

  // Edges
  mmCtx.strokeStyle = '#2a6a50'; mmCtx.lineWidth = 1;
  for (const e of edges) {
    const pts = edgePts(e);
    if (pts.length < 4) continue;
    mmCtx.beginPath();
    mmCtx.moveTo(pts[0]*ms+mox, pts[1]*ms+moy);
    for (let i=2; i<pts.length; i+=2) mmCtx.lineTo(pts[i]*ms+mox, pts[i+1]*ms+moy);
    mmCtx.stroke();
  }

  // Nodes
  for (const n of nodes) {
    const nx = n.x*ms+mox, ny = n.y*ms+moy;
    mmCtx.fillStyle = n.type==='source' ? '#00ffcc' : n.type==='bulb' ? '#ffdd00' : '#446655';
    mmCtx.beginPath(); mmCtx.arc(nx, ny, 3, 0, Math.PI*2); mmCtx.fill();
  }

  // Viewport rectangle
  const vx0 = (-viewX/viewScale)*ms+mox, vy0 = (-viewY/viewScale)*ms+moy;
  const vx1 = (VW/viewScale)*ms, vy1 = (VH/viewScale)*ms;
  mmCtx.strokeStyle = '#00ffcc88'; mmCtx.lineWidth = 1;
  mmCtx.strokeRect(vx0, vy0, vx1, vy1);
}

// ── MAIN DRAW LOOP ─────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, VW, VH);
  ctx.fillStyle = '#08080f'; ctx.fillRect(0, 0, VW, VH);

  ctx.save();
  ctx.setTransform(viewScale, 0, 0, viewScale, viewX, viewY);

  drawGrid();
  for (const e of edges) drawEdge(e, selectedEdge?.id===e.id, hoveredEdge?.id===e.id);
  drawWirePreview();
  const multiIds = new Set(selectedNodes.map(n => n.id));
  for (const n of nodes) drawNode(n, selectedNode?.id===n.id || multiIds.has(n.id), hoveredNode?.id===n.id);

  ctx.restore();

  // Rectangle de sélection (screen space)
  if (selectionRect) {
    const a = worldToScreen(selectionRect.sx, selectionRect.sy);
    const b = worldToScreen(selectionRect.ex, selectionRect.ey);
    const rx = Math.min(a.x, b.x), ry = Math.min(a.y, b.y);
    const rw = Math.abs(b.x - a.x), rh = Math.abs(b.y - a.y);
    ctx.save();
    ctx.fillStyle = '#00ffcc0d';
    ctx.fillRect(rx, ry, rw, rh);
    ctx.strokeStyle = '#00ffcc88';
    ctx.lineWidth = 1;
    ctx.setLineDash([5, 4]);
    ctx.strokeRect(rx, ry, rw, rh);
    ctx.restore();
  }

  drawMinimap();
  requestAnimationFrame(draw);
}
draw();

// ── TEST OVERLAY ───────────────────────────────────────────
function openTest() {
  const json = toJSON();
  localStorage.setItem('elecgame_test_level', JSON.stringify(json));
  const overlay = document.getElementById('test-overlay');
  overlay.classList.add('visible');
  document.getElementById('test-iframe').src = 'game.html?test=1';
}
function closeTest() {
  document.getElementById('test-overlay').classList.remove('visible');
  document.getElementById('test-iframe').src = 'about:blank';
}
function reloadTest() {
  const json = toJSON();
  localStorage.setItem('elecgame_test_level', JSON.stringify(json));
  document.getElementById('test-iframe').src = 'game.html?test=1';
}

// ── SERIALIZATION ──────────────────────────────────────────
function toJSON() {
  return {
    name: document.getElementById('level-name').value || 'Mon niveau',
    ballSpeedMult: parseFloat(document.getElementById('ball-speed').value) || 1.0,
    nodes: nodes.map(n => ({ id: n.id, type: n.type, x: n.x, y: n.y, ...(n.group ? { group: n.group } : {}) })),
    edges: edges.map(e => ({
      id: e.id, from: e.from, to: e.to,
      wayY: e.wayY ?? null,
      switch: e.switch ?? null,
      resistance: !!e.resistance,
      resDuration: e.resistance ? (e.resDuration ?? 3) : undefined,
      inductance: !!e.inductance,
      indDuration: e.inductance ? (e.indDuration ?? 2) : undefined,
      micro: !!e.micro,
      microDuration: e.micro ? (e.microDuration ?? 5) : undefined
    }))
  };
}

function saveFile() {
  const json = JSON.stringify(toJSON(), null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (document.getElementById('level-name').value || 'level') + '.json';
  a.click();
}

function loadFile() { document.getElementById('file-input').click(); }

document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try { loadFromJSON(JSON.parse(ev.target.result)); }
    catch(err) { alert(tr('alert.invalid')); }
  };
  reader.readAsText(file);
  e.target.value = '';
});

function loadFromJSON(data) {
  nodes = (data.nodes||[]).map(n => ({ id: n.id, type: n.type||'node', x: n.x, y: n.y }));
  edges = (data.edges||[]).map(e => ({
    id: e.id, from: e.from, to: e.to,
    wayY: e.wayY ?? null,
    switch: e.switch ?? null,
    resistance: !!e.resistance,
    resDuration: e.resDuration ?? 3,
    inductance: !!e.inductance,
    indDuration: e.indDuration ?? 2,
    micro: !!e.micro,
    microDuration: e.microDuration ?? 5
  }));
  nextNodeId = nodes.reduce((m,n) => Math.max(m,n.id+1), 0);
  nextEdgeId = edges.reduce((m,e) => Math.max(m,e.id+1), 0);
  document.getElementById('level-name').value = data.name || tr('default.name');
  const spd = data.ballSpeedMult ?? 1.0;
  document.getElementById('ball-speed').value = spd;
  document.getElementById('ball-speed-val').textContent = '×' + spd.toFixed(2);
  selectedNode = null; selectedEdge = null; wireFrom = null;
  buildProps(); validate();
  fitView();
  flash(tr('flash.loaded') + (data.name||''));
}

function clearLevel() {
  if (!confirm(tr('confirm.clear'))) return;
  nodes = [
    { id: 0, type: 'source', x: 60,  y: 150 },
    { id: 1, type: 'bulb',   x: 740, y: 150 }
  ];
  edges = []; nextNodeId = 2; nextEdgeId = 0;
  selectedNode = null; selectedEdge = null; wireFrom = null;
  document.getElementById('level-name').value = tr('default.name');
  document.getElementById('ball-speed').value = 1.0;
  document.getElementById('ball-speed-val').textContent = '×1.00';
  buildProps(); validate(); fitView();
}

// Init
applyLang();
buildProps();
validate();
fitView();
</script>
